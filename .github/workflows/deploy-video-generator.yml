name: Deploy video-generator

on:
  push:
    branches:
      - main
    paths:
      - "video_generator/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./video_generator/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/video-generator:latest
            ghcr.io/${{ env.OWNER }}/video-generator:${{ github.sha }}

      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/eduvi
            IMAGE="ghcr.io/${{ env.OWNER }}/video-generator:${{ github.sha }}"

            # Pull immutable image for this commit and retag latest locally
            # so existing compose config still resolves the newest build.
            docker pull "$IMAGE"
            docker tag "$IMAGE" "ghcr.io/${{ env.OWNER }}/video-generator:latest"

            # Recreate service to ensure container uses the new image.
            docker compose up -d --no-deps --force-recreate video-generator

            # Verification: print running container + image digest used.
            docker compose ps video-generator
            CID=$(docker compose ps -q video-generator)
            if [ -n "$CID" ]; then
              docker inspect "$CID" --format 'running_image={{.Config.Image}} image_id={{.Image}}'
              docker logs --tail 120 "$CID" | grep -E 'concat_mode=|Processing video for task=' || true
            fi
