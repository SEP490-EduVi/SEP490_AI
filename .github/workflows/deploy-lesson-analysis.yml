name: Deploy lesson-analysis

on:
  push:
    branches:
      - main
    paths:
      - "lesson_analysis/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./lesson_analysis
          file: ./lesson_analysis/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lesson-analysis:latest
            ghcr.io/${{ github.repository_owner }}/lesson-analysis:${{ github.sha }}

      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/eduvi
            docker compose pull lesson-analysis
            docker compose up -d lesson-analysis
