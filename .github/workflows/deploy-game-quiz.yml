name: Deploy game-quiz

on:
  push:
    branches:
      - main
    paths:
      - "game_quiz/**"
      - ".github/workflows/deploy-game-quiz.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./game_quiz/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/game-quiz:latest
            ghcr.io/${{ env.OWNER }}/game-quiz:${{ github.sha }}

      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/eduvi
            docker compose pull game-quiz
            docker compose up -d --no-deps game-quiz
